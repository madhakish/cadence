name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-tests:
    name: CadenceCore tests (Linux)
    runs-on: ubuntu-latest
    container: swift:5.10
    steps:
      - uses: actions/checkout@v5
      - name: Run unit tests
        working-directory: CadenceCore
        run: swift test

  app-build:
    name: App build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run unit tests (Darwin)
        working-directory: CadenceCore
        run: swift test
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build for iOS Simulator
        run: >-
          xcodebuild build
          -project Cadence.xcodeproj
          -scheme Cadence
          -configuration Release
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/sim
          CODE_SIGNING_ALLOWED=NO
      - name: Build unsigned device app
        run: >-
          xcodebuild build
          -project Cadence.xcodeproj
          -scheme Cadence
          -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath build/device
          CODE_SIGNING_ALLOWED=NO
      - name: Package installer artifacts
        run: |
          mkdir -p dist/Payload
          cp -R build/device/Build/Products/Release-iphoneos/Cadence.app dist/Payload/
          (cd dist && zip -qry Cadence-unsigned.ipa Payload)
          (cd build/sim/Build/Products/Release-iphonesimulator && zip -qry "$GITHUB_WORKSPACE/dist/Cadence-simulator.app.zip" Cadence.app)
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cadence-installer
          path: |
            dist/Cadence-unsigned.ipa
            dist/Cadence-simulator.app.zip
          if-no-files-found: error

  release:
    name: Semantic release
    needs: [core-tests, app-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: semantic-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: Cadence-installer
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes -p semantic-release@24 -p @semantic-release/exec@6 semantic-release

  testflight:
    name: TestFlight (fastlane)
    needs: [app-build]
    # Dormant until you opt in: set the repo variable TESTFLIGHT_ENABLED=true
    # (and add the Apple secrets). Until then this job is skipped — main stays green.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.TESTFLIGHT_ENABLED == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build & upload to TestFlight
        env:
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane beta

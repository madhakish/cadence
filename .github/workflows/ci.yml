name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core-tests:
    name: ComebackCore tests (Linux)
    runs-on: ubuntu-latest
    container: swift:5.10
    steps:
      - uses: actions/checkout@v5
      - name: Run unit tests
        working-directory: ComebackCore
        run: swift test

  app-build:
    name: App build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run unit tests (Darwin)
        working-directory: ComebackCore
        run: swift test
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build for iOS Simulator
        run: >-
          xcodebuild build
          -project Comeback.xcodeproj
          -scheme Comeback
          -configuration Release
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/sim
          CODE_SIGNING_ALLOWED=NO
      - name: Build unsigned device app
        run: >-
          xcodebuild build
          -project Comeback.xcodeproj
          -scheme Comeback
          -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath build/device
          CODE_SIGNING_ALLOWED=NO
      - name: Package installer artifacts
        run: |
          mkdir -p dist/Payload
          cp -R build/device/Build/Products/Release-iphoneos/Comeback.app dist/Payload/
          (cd dist && zip -qry Comeback-unsigned.ipa Payload)
          (cd build/sim/Build/Products/Release-iphonesimulator && zip -qry "$GITHUB_WORKSPACE/dist/Comeback-simulator.app.zip" Comeback.app)
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Comeback-installer
          path: |
            dist/Comeback-unsigned.ipa
            dist/Comeback-simulator.app.zip
          if-no-files-found: error

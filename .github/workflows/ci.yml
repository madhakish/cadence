name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Default every job's GITHUB_TOKEN to read-only; jobs that need more (release)
# elevate themselves explicitly.
permissions:
  contents: read

# All actions are pinned to full commit SHAs (with the version as a comment) so
# a moved/re-pointed tag on an action repo can't inject code into these jobs —
# the tj-actions/changed-files-style supply-chain attack. Dependabot
# (.github/dependabot.yml) keeps the pins current.
jobs:
  core-tests:
    name: CadenceCore tests (Linux)
    runs-on: ubuntu-latest
    container: swift:5.10@sha256:ffc42e399ad0cad324f68d58f65e4d5f2c22eb9df73c4dfa249e898d497254b3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run unit tests
        working-directory: CadenceCore
        run: swift test

  # The CadenceCore↔core.js parity mandate is enforced HERE, pre-merge: a PR
  # that touches either side without its mirror fails these suites. (pages.yml
  # re-runs them post-merge as the deploy gate.)
  web-tests:
    name: Web tests (parity + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install pinned test deps
        working-directory: web
        run: npm ci
      - name: Core math parity tests
        working-directory: web
        run: node tests/core.test.mjs
      - name: Runtime smoke test (jsdom + fake-indexeddb)
        working-directory: web
        run: node tests/smoke.test.mjs

  app-build:
    name: App build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run unit tests (Darwin)
        working-directory: CadenceCore
        run: swift test
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Verify V1 store migration
        run: >-
          xcodebuild test
          -project Cadence.xcodeproj
          -scheme CadenceMigrationTests
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath build/migration
      - name: Build for iOS Simulator
        run: >-
          xcodebuild build
          -project Cadence.xcodeproj
          -scheme Cadence
          -configuration Release
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/sim
          CODE_SIGNING_ALLOWED=NO
      - name: Build unsigned device app
        run: >-
          xcodebuild build
          -project Cadence.xcodeproj
          -scheme Cadence
          -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath build/device
          CODE_SIGNING_ALLOWED=NO
      - name: Package installer artifacts
        run: |
          mkdir -p dist/Payload
          cp -R build/device/Build/Products/Release-iphoneos/Cadence.app dist/Payload/
          (cd dist && zip -qry Cadence-unsigned.ipa Payload)
          (cd build/sim/Build/Products/Release-iphonesimulator && zip -qry "$GITHUB_WORKSPACE/dist/Cadence-simulator.app.zip" Cadence.app)
      - name: Upload installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Cadence-installer
          path: |
            dist/Cadence-unsigned.ipa
            dist/Cadence-simulator.app.zip
          if-no-files-found: error

  release:
    name: Semantic release
    # web-tests gates the release too: a tag must never be cut while the JS
    # mirror of CadenceCore is failing (the parity mandate, issue 21).
    needs: [core-tests, web-tests, app-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: semantic-release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # semantic-release authenticates via the GITHUB_TOKEN env var below;
          # don't leave the job token sitting in .git/config for later steps.
          persist-credentials: false
      - name: Download installer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Cadence-installer
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .github/release/package-lock.json
      - name: Install pinned release toolchain
        # `npm ci` against the committed lockfile — the release toolchain is
        # content-addressed, not "whatever the registry serves today".
        working-directory: .github/release
        run: npm ci
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/release/node_modules/.bin/semantic-release

  testflight:
    name: TestFlight (fastlane)
    # Runs after release so the version tag semantic-release just cut is on
    # origin and maps into the uploaded build (CFBundleShortVersionString).
    needs: [app-build, release]
    # Dormant until you opt in: set the repo variable TESTFLIGHT_ENABLED=true
    # (and add the Apple secrets). Until then this job is skipped — main stays green.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.TESTFLIGHT_ENABLED == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need tags to resolve the semantic version
          persist-credentials: false
      - name: Resolve app version from the latest release tag
        id: ver
        # The tag semantic-release owns (e.g. v1.13.0) becomes the marketing
        # version, so TestFlight builds track the semantic version 1:1. Falls
        # back to the project.yml value before the first release.
        run: echo "version=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo 0.1.0)" >> "$GITHUB_OUTPUT"
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Select the latest stable Xcode
        # App Store upload requires the current SDK; macos-latest still defaults
        # to an older Xcode, which altool rejects with a 409 "SDK version issue".
        # Every Xcode on the runner is already installed under /Applications, so
        # "latest stable" is a version-sorted find + xcode-select. Deliberately
        # NOT a third-party action: this job holds all the Apple signing
        # secrets, and no external maintainer belongs in it.
        # Version selection in python3 (always on the runner) instead of
        # `sort -V`, which BSD/macOS sort builds don't reliably support.
        run: |
          LATEST="$(python3 -c '
          import glob, re, sys
          apps = [a for a in glob.glob("/Applications/Xcode_*.app")
                  if not re.search(r"beta|release[_ .-]?candidate", a, re.I)]
          def ver(a):
              m = re.search(r"Xcode_([0-9][0-9.]*)", a)
              return [int(x) for x in m.group(1).strip(".").split(".")] if m else [0]
          print(max(apps, key=ver) if apps else "")
          ')"
          if [ -z "$LATEST" ]; then echo "No stable Xcode found on runner" >&2; exit 1; fi
          echo "Selecting $LATEST"
          sudo xcode-select --switch "$LATEST/Contents/Developer"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build & upload to TestFlight
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER }}
          DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # Certs are fetched read-only by default (see Fastfile). For one-off
          # re-provisioning set the repo variable MATCH_READONLY=false and use a
          # read/write PAT, then revert both.
          MATCH_READONLY: ${{ vars.MATCH_READONLY }}
        run: bundle exec fastlane beta

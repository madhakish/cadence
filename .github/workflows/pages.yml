name: Deploy web app (Pages)

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install pinned test deps
        working-directory: web
        run: npm ci
      - name: Core math parity tests
        working-directory: web
        run: node tests/core.test.mjs
      - name: Runtime smoke test (jsdom + fake-indexeddb)
        working-directory: web
        run: node tests/smoke.test.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - name: Stamp build version into the service worker
        # Changes sw.js every deploy → browsers install the new worker and
        # refresh the cached app. Without this, installed phones never update.
        run: sed -i "s/__BUILD__/${GITHUB_SHA::12}/" web/sw.js
      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

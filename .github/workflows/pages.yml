name: Deploy web app (Pages)

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Actions pinned to full commit SHAs (version in comment) — see ci.yml.
jobs:
  test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install pinned test deps
        working-directory: web
        run: npm ci
      - name: Core math parity tests
        working-directory: web
        run: node tests/core.test.mjs
      - name: Runtime smoke test (jsdom + fake-indexeddb)
        working-directory: web
        run: node tests/smoke.test.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Stamp build version into the service worker
        # Changes sw.js every deploy → browsers install the new worker and
        # refresh the cached app. Without this, installed phones never update.
        run: sed -i "s/__BUILD__/${GITHUB_SHA::12}/" web/sw.js
      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

name: Deploy web app (Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Actions pinned to full commit SHAs (version in comment) — see ci.yml.
jobs:
  # Manual recovery path. Normal main-branch deploys live in ci.yml and reuse
  # its already-passing web-tests job instead of running this suite twice.
  test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install pinned test deps
        working-directory: web
        run: npm ci
      - name: Core math parity tests
        working-directory: web
        run: node tests/core.test.mjs
      - name: Runtime smoke test (jsdom + fake-indexeddb)
        working-directory: web
        run: node tests/smoke.test.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Stamp build version into the service worker
        # Changes sw.js every deploy → browsers install the new worker and
        # refresh the cached app. Without this, installed phones never update.
        run: sed -i "s/__BUILD__/${GITHUB_SHA::12}/" web/sw.js
      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

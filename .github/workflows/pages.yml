name: Deploy web app (Pages)

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Core math parity tests
        working-directory: web
        run: node tests/core.test.mjs
      - name: Runtime smoke test (jsdom + fake-indexeddb)
        working-directory: web
        run: |
          npm install --no-save jsdom fake-indexeddb
          node tests/smoke.test.mjs

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

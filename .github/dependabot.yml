# Keeps the security pins current: actions are SHA-pinned in the workflows and
# the release toolchain / web test deps are lockfile-pinned, so updates only
# ever arrive as reviewable PRs — never silently at run time.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
  - package-ecosystem: npm
    directory: /.github/release
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

# XcodeGen spec. Run `xcodegen generate` in this directory to produce
# Cadence.xcodeproj (install: `brew install xcodegen`).
name: Cadence
options:
  bundleIdPrefix: com.cadence
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  CadenceCore:
    path: CadenceCore

targets:
  Cadence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Cadence
    dependencies:
      - package: CadenceCore
    entitlements:
      path: Cadence/Cadence.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSHealthUpdateUsageDescription: >-
          Optionally writes completed workouts and bodyweight to Health.
          Cadence reads nothing from Health.
        NSPhotoLibraryUsageDescription: >-
          Lets you store a photo of your gym membership barcode so your
          phone can stand in for the keychain tag.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.Cadence
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  Cadence:
    build:
      targets:
        Cadence: all
    test:
      targets:
        - package: CadenceCore/CadenceCoreTests

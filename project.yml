# XcodeGen spec. Run `xcodegen generate` in this directory to produce
# Cadence.xcodeproj (install: `brew install xcodegen`).
name: Cadence
options:
  bundleIdPrefix: com.madhakish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  CadenceCore:
    path: CadenceCore

targets:
  Cadence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Cadence
    dependencies:
      - package: CadenceCore
    entitlements:
      path: Cadence/Cadence.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        # Reference the build settings (don't let XcodeGen bake literal
        # "1.0"/"1"): the TestFlight lane overrides MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION at archive time, and a literal here would
        # silently win — which is why every upload read v1.0 regardless.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # No custom/non-exempt encryption — only standard OS + HTTPS, which is
        # export-exempt. Declaring this clears the "Missing Compliance" hold on
        # every TestFlight/App Store upload (no per-build manual answer).
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSHealthUpdateUsageDescription: >-
          Optionally writes completed workouts and bodyweight to Health.
          Cadence reads nothing from Health.
        NSHealthShareUsageDescription: >-
          Cadence does not read your health data. Apple requires this text
          because Health access is enabled; Cadence only writes the workouts
          and bodyweight you choose to save.
        NSPhotoLibraryUsageDescription: >-
          Lets you store a photo of your gym membership barcode so your
          phone can stand in for the keychain tag.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madhakish.Cadence
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Cadence:
    build:
      targets:
        Cadence: all
    test:
      targets:
        - package: CadenceCore/CadenceCoreTests

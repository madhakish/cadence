# XcodeGen spec. Run `xcodegen generate` in this directory to produce
# Cadence.xcodeproj (install: `brew install xcodegen`).
name: Cadence
options:
  bundleIdPrefix: com.madhakish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  CadenceCore:
    path: CadenceCore

targets:
  Cadence:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Cadence
    dependencies:
      - package: CadenceCore
      - target: CadenceWidgets   # embedded so the rest Live Activity ships in the app
    entitlements:
      path: Cadence/Cadence.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Cadence/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        # Reference the build settings (don't let XcodeGen bake literal
        # "1.0"/"1"): the TestFlight lane overrides MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION at archive time, and a literal here would
        # silently win — which is why every upload read v1.0 regardless.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # No custom/non-exempt encryption — only standard OS + HTTPS, which is
        # export-exempt. Declaring this clears the "Missing Compliance" hold on
        # every TestFlight/App Store upload (no per-build manual answer).
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # No forced UIUserInterfaceStyle: the theme picker drives appearance via
        # SwiftUI .preferredColorScheme — .dark for the three dark themes, nil
        # (follow the OS) for System. A hard "Dark" here would override that and
        # keep System from ever going light.
        NSHealthUpdateUsageDescription: >-
          Optionally writes completed workouts and bodyweight to Health.
          Cadence reads nothing from Health.
        NSHealthShareUsageDescription: >-
          Cadence does not read your health data. Apple requires this text
          because Health access is enabled; Cadence only writes the workouts
          and bodyweight you choose to save.
        NSPhotoLibraryUsageDescription: >-
          Lets you store a photo of your gym membership barcode so your
          phone can stand in for the keychain tag.
        # Enables the between-sets rest Live Activity (Lock Screen + Dynamic Island).
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madhakish.Cadence
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Widget extension: hosts the rest Live Activity + its Lock Screen App Intents.
  # Shares the Cadence/LiveActivity sources with the app so the ActivityAttributes
  # and intents are one definition across both processes.
  CadenceWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - CadenceWidgets
      - Cadence/LiveActivity
    info:
      path: CadenceWidgets/Info.plist
      properties:
        CFBundleDisplayName: Cadence
        # Match the app's version/build (App Store rejects a mismatched extension).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madhakish.Cadence.Widgets
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  Cadence:
    build:
      targets:
        Cadence: all
    test:
      targets:
        - package: CadenceCore/CadenceCoreTests

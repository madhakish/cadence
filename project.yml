# XcodeGen spec. Run `xcodegen generate` in this directory to produce
# Comeback.xcodeproj (install: `brew install xcodegen`).
name: Comeback
options:
  bundleIdPrefix: com.comeback
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  ComebackCore:
    path: ComebackCore

targets:
  Comeback:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Comeback
    dependencies:
      - package: ComebackCore
    entitlements:
      path: Comeback/Comeback.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Comeback/Info.plist
      properties:
        CFBundleDisplayName: Comeback
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSHealthUpdateUsageDescription: >-
          Optionally writes completed workouts and bodyweight to Health.
          Comeback reads nothing from Health.
        NSPhotoLibraryUsageDescription: >-
          Lets you store a photo of your gym membership barcode so your
          phone can stand in for the keychain tag.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.comeback.Comeback
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  Comeback:
    build:
      targets:
        Comeback: all
    test:
      targets:
        - package: ComebackCore/ComebackCoreTests
